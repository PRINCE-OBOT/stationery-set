<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- <image width="200" href="./tool.jpg" /> -->
    <defs>
      <!-- Pattern -->
      <pattern id="backgroundLayout" width="0.1" height="0.1">
        <path d="M0,10 h20 M0,20 h20 M20,0 v20 M10,0 v20" stroke="black" stroke-width=".2"/>
        <circle cx="20" cy="20" r="1" fill="red" />
      </pattern>
      
      <pattern id="patternPeriod" width="0.2" height="0.2">
        <circle cx="2" cy="2" r=".4" fill="black" />
      </pattern>
      <!-- Symbol -->
      <symbol id="symbolPatternPeriod" viewBox="0 0 200 200">
        <rect x="0" y="0" width="20" height="20" fill="url(#patternPeriod)" transform="rotate(45, 10, 10)"/>
      </symbol>
      <symbol id="symbolCross" viewBox="0 0 200 200">
        <path d="M0,5 l10,0 M5,0 l0,10" stroke="black" stroke-width="3"/>
      </symbol>
      <symbol id="symbolStar" viewBox="0 0 200 200">
        <polygon points="10,10 13,2 16,10 26,10 20,16 23,26 13,20 3,26 7,16 0,10" />
      </symbol>
      <symbol id="symbolCurvyLine" viewBox="0 0 200 200">
        <path d="
        M0,10 c0,-6 10,-6 10,0 c0,6 10,6 10,0 c0,-6 10,-6 10,0 
        c0,6 10,6 10,0 c0,-6 10,-6 10,0 c0,6 10,6 10,0 c0,-6 10,-6 10,0 
        c0,6 10,6 10,0 c0,-6 10,-6 10,0 c0,6 10,6 10,0 c0,-6 10,-6 10,2" 
        fill="none" stroke="black" stroke-width="1.5"/>
      </symbol>
      <symbol id="cards" height="180" viewBox="0 0 200 200">
        <rect rx="3" ry="3" width="60" height="30" fill="darkgreen" stroke="black" />
        <path d="M10,5 l40,0 q0,5 5,5 l0,10 q-5,0 -5,5 l-40,0 q0,-5 -5,-5 l0,-10 q5,0 5,-5" stroke="black" fill="none" />
        <circle cx="30" cy="15" r="5" fill="none" stroke="black" />
      </symbol>
      <!-- Marker -->
      <marker id="bluntArrow" markerWidth="200" markerHeight="10" refX="1" refY="5" orient="auto">
        <g stroke="black" fill="#d4dbdb">
          <path d="M181,0 l4,1.5 0,7 -4,1.5"/>
          <path d="M15,3.5 c30,-3 60,-1 160,0 z" stroke="grey" stroke-width=".2" />
          <polygon points="185,1.5 195,5 185,8.5" fill="black" />
          <polygon points="185,1.5 195,5 185,6" fill="brown" />
          <polygon points="0.3,3.3 3.3,0.3 6.6,0.3 9.9,3.3 9.9,6.6 6.6,9.9 3.3,9.9 0.3,6.6" />
          <circle cx="5" cy="5" r="2" fill="brown" />
        </g>
      </marker>
      
      <marker id="ruleLine" markerWidth="85" markerHeight="7" refX="100">
        <path d="M10,0 v6 M20,0 v5 M30,0 v6 M40,0 v4.5 M50,0 v6 M60,0 v4.5 M70,0 v6 M80,0 v4.5" stroke="black" />
      </marker>
      <marker id="ruleArrow" markerWidth="85" markerHeight="7" refX="5" >
        <polygon points="10,.5 60,.5 10,3" fill="#d4dbdb" />
      </marker>
      <marker id="rulerMeter" markerWidth="200" markerHeight="15" refX="-8" refY="10" orient="auto">
        <path d="M0,11 l90,0" stroke="orange" stroke-width="8" />
        <path d="M0,8 l95,0" marker-end="url(#ruleLine)" marker-start="url(#ruleArrow)" />

        <path d="M105,11 l80,0" stroke="orange" stroke-width="8" />
        <path d="M110,8 l80,0" marker-end="url(#ruleLine)" />
      <marker/>

      <!-- Linear -->
       <linearGradient id="linear" x1="0%" y1="50%">
        <stop offSet="0%" stop-color="#7a4db5" />
        <stop offSet="65%" stop-color="#7a4db5" />
        <stop offSet="65%" stop-color="#000" />
       </linearGradient>
    </defs>
    <rect fill="url(#backgroundLayout)" width="100%" stroke="black" stroke-width=".2" height="100%" />
    
    <g id="Curvline">
      <!-- cup1 -->
      <path d="M30,60 c-15,-1 -15,15 0,13 c12,-1 12,8 0,8 c-5,0 -5,8 0,10 c0,1 15,-1 13,2" stroke="black" fill="none" />
      <!-- Cup and Time-->
      <use x="55"y="73"  width="150" href="#symbolCurvyLine" />
      <!-- Bulb -->
      <use x="100"y="35"  width="150" href="#symbolCurvyLine" />
      <!-- cards -->
      <use x="25"y="145"  width="150" href="#symbolCurvyLine" />
      <use x="100"y="145"  width="150" href="#symbolCurvyLine" transform="translate(-30, 40), rotate(-90, 100, 145)"/>
    </g>
    <!-- Star -->
    <g>
      <use x="60" y="-15" width="120" href="#symbolStar" fill="lightblue" />
      <use x="70" y="-25" width="50" href="#symbolStar" fill="lightgreen" />
      <use x="13" y="32" width="98" href="#symbolStar" fill="purple" />
      <use x="39" y="66" width="60" href="#symbolStar" fill="purple" />
      <use x="173" y="0" width="60" href="#symbolStar" fill="green" />
    </g>
    <g id="Period">
      <!-- Bulb Period-->
      <path d="M130,30 l10,10 15,-15" fill="none" stroke-width="8" stroke="red"/>
      <use x="140" y="30"  href="#symbolPatternPeriod" />
      <use x="128" y="25" height="180" href="#symbolPatternPeriod" />
      <use x="128" y="20" height="180" href="#symbolPatternPeriod" />
      <use x="60" y="20" height="180" href="#symbolPatternPeriod" />
      <use x="55" y="18" height="180" href="#symbolPatternPeriod" />
      <!-- Cup Period-->
      <use x="10" y="83" height="180" href="#symbolPatternPeriod" />
      <use x="20" y="83" height="180" href="#symbolPatternPeriod" />
      <use x="30" y="83" height="180" href="#symbolPatternPeriod" />
      <use x="40" y="83" height="180" href="#symbolPatternPeriod" />
      <use x="5" y="120" height="180" href="#symbolPatternPeriod" />
      <use x="8" y="115" height="180" href="#symbolPatternPeriod" />
      <!-- Cards Period -->
      <use x="60" y="160" height="180" href="#symbolPatternPeriod" />
      <use x="65" y="162" height="180" href="#symbolPatternPeriod" />
      <use x="68" y="165" height="180" href="#symbolPatternPeriod" />
      <!-- Time Period -->
      <use x="100" y="95" height="180" href="#symbolPatternPeriod" />
      <use x="110" y="95" height="180" href="#symbolPatternPeriod" />
      <use x="110" y="110" height="180" href="#symbolPatternPeriod" />
      <use x="110" y="90" height="180" href="#symbolPatternPeriod" />
      <use x="111" y="81" height="180" href="#symbolPatternPeriod" />
      <use x="115" y="87" height="180" href="#symbolPatternPeriod" />
      <use x="155" y="125" height="180" href="#symbolPatternPeriod" />
      <use x="160" y="125" height="180" href="#symbolPatternPeriod" />
    </g>
    <g id="Cup">
      <!-- Cup hand -->
      <ellipse cx="65" cy="110" rx="13" ry="12" fill="#050e22;" />
      <ellipse cx="65" cy="110" rx="8" ry="11" fill="lightblue" />
      <circle cx="65" cy="110" r="5" fill="white" />
      <!-- Inside Cup -->
      <path d="M15,95 l50,0 c0,0 5,30 -15,30 l-20,0 c-17,-3 -15,-10 -16,-30" fill="#050e22;" />
      <path d="M16,96 l40,0 c0,-5 3,25 -5,28 l-20,0 c-17,-3 -15,-10 -16,-28" fill="lightblue" />
      <!-- Love      -->
      <path d="M38,120 l10,-10 c6,-10 -10,-11 -10,-5 c-5,-10 -15,0 -10,5 l10,10 z" stroke="black" stroke-width="2" />
      <path d="M38,120 l10,-10 c6,-10 -10,-11 -10,-5 c-5,-10 -15,0 -10,5 l10,10 z" fill="red" />
      <path d="M38,120 l10,-10 c1,-2 2,-2 1,-5 l-13,13" stroke="black" />
      <ellipse cx="32" cy="105" rx="2" ry=".8" fill="white" fill-opacity=".8" transform="rotate(-20 , 32, 105)"/>
      <!-- Offor -->
      <path d="M18,98 c0,0 -4,13 6,22 c-5,-10 -2,-20 0,-22 z" fill="white" fill-opacity="0.7" />
    </g>
    <!-- bulb -->
    <g>
      <path id="bigBulb" d="M92.5,64 c-20,-10 -20,-42 12.5,-42 c20,1 30,35 5.5,42 l0,5 l-18,0 z"  stroke="black" fill="orange"/>
      <path id="bigCurve" d="M87,58 c-21,-35 25,-42 30,-25 c-12,-15 -45,0 -30,25" fill="#d4dbdb"/>
      <path id="smallCurve" d="M112,58 c14,0 12,-15 7,-20 c2,8 4,12 -7,20" fill="black"/>
      <path id="lineCurve" d="M97,69 c0,0 5,-40 -5,-33 c-5,10 28,8 21,0 c-8,-4 -8,10 -6,33" fill="none" stroke="black" />
      <path id="smalBulbCapCurve" d="M101,85 c5,2 7,8 -15,10" fill="none" stroke="black" />
      <path id="smalBulbCap" d="M98,80 a1,1.4 1 1 0 8,0" fill="lightblue" stroke="black" />
      <path id="bulbCap" d="M92.5,69 a1,1.4 1 1 0 18,0 M91,73 l20,0 M93,78 l16.5,0" stroke="black" fill="green" />
    </g>
    <!-- cross -->
    <g>
      <use x="130" y="50" href="#symbolCross" />
      <use x="23" y="0" width="100" href="#symbolCross" />
      <use x="63" y="36" width="100" href="#symbolCross" />
      <use x="22" y="128" width="170" href="#symbolCross" />
      <use x="147" y="133" width="120" href="#symbolCross" />
      <use x="162" y="104" width="120" href="#symbolCross" />
    </g>
    <!-- ruler -->
    <g>
      <rect rx="2" ry="2" x="33" y="30" width="192" height="16" transform="translate(12,-4), rotate(44, 25, 20)" />
      <path d="M30,30 l135,130" marker-start="url(#rulerMeter)" />
    </g>
    <!-- pencil -->
    <g>
      <path d="M27,170 l178,0" stroke="black" stroke-width="10" transform="rotate(-41, 25, 165)" />
      <path d="M28,168.7 l176,0" stroke="brown" stroke-width="5" transform="rotate(-41, 25, 165)" />
      <path d="M25,170 l182,0" transform="rotate(-41, 25, 165)" marker-start="url(#bluntArrow)" />
    </g>
    <!-- cards -->
    <g>
      <use href="#cards" x="82" y="165" transform="translate(5, -5), rotate(45, 137, 165)" />
      <circle cx="120" cy="157" r="5" fill="black" />
      <use href="#cards" x="30" y="140" transform="rotate(-90, 90, 140)" />
      <use href="#cards" x="60" y="150" transform="translate(-8, 8), rotate(-42, 60, 150)" />
      <circle cx="104" cy="163" r="5" fill="black" />
      <path d="M90,155 l25,-22 l7,8 l0,37 l-5,-5 l0,-30 l-27,20" stroke-opacity="0.4"  stroke="black"/>

      <rect x="43" y="165" rx="8" width="20" height="15" fill="black" stroke="black" />
      <path d="M49,165 a1,1 1 1 0 15,0" fill="orange" transform="translate(2, 0), rotate(90, 49, 165)" />
      <path d="M49,165 a1,.6 0 1 1 15,0" fill="orange" transform="translate(2, 0), rotate(90, 49, 165)" />
      <path d="M58,166 c5,2 7,10 0,13 c0,0 7,-6 0,-13" fill="orange"  />
      <circle cx="50" cy="170" fill="white" r="4" fill-opacity="0.8" /> 
    </g>
    <!-- Time -->
    <g>
      <circle cx="161" cy="85" r="11" fill="url(#linear)" stroke="black"/>
      <circle cx="161" cy="85" r="8" fill="white" stroke="black" />
      <rect x="153" y="85" rx="6" width="16" height="15" />
      <path d="M157,87 a1,1 1 1 0 12,0" stroke="#7a4db5" fill="#7a4db5" transform="translate(0,-2), rotate(90, 158, 89)" />
      <path d="M157,87 a1,1 1 1 0 2,0" fill="white" fill-opacity="0.7" transform="translate(-1,1), rotate(30, 158, 89)" />
      <circle cx="161" cy="115" r="24" fill="#7a4db5" stroke="black" />
      <circle cx="161" cy="115" r="16" fill="white" stroke="black" />
      <circle cx="161" cy="115" r="14" fill="black" stroke="black" />
      <circle cx="161" cy="115" r="10" fill="white" stroke="black" />
      <path d="M145,130 c-10,-10 -9,-30 8,-35 c-10,10 -15,20 -8,35" fill="white" stroke="white" />
      <path d="M170,135 c15,-10 15,-20 8,-33 c5,10 0,25 -8,33" stroke="black" />
      <path d="M147,115 a1,1 1 1 0 28,0" fill="white" stroke="black" transform="rotate(150, 161, 115)"/>
      <path d="M147,115 a1,.8 1 1 1 28,0" fill="white" stroke="black" transform="rotate(150, 161, 115)"/>
      <path d="M161,103 l0,14 l9,-7" fill="none" stroke="black" />
    </g>
  </svg>
</body>
</html>
